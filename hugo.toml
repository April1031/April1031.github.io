baseURL = 'https://April1031.github.io/'
languageCode = 'zh-cn'
title = 'As a Metaphor'
theme = "PaperMod"

# --- 1. 全局参数区 ---
[params]
    env = "production"
    robotsNoIndex = false 
    defaultTheme = "auto"
    ShowReadingTime = true
    ShowCodeCopyButtons = true

    # --- 2. 个人主页设置（必须嵌套在 params 内部） ---
    [params.profileMode]
        enabled = true
        title = "April1031"
        subtitle = "" 
        imageUrl = "/avatar1.png" 
        imageSize = 120
        imageTitle = "April1031"

        [[params.profileMode.buttons]]
            name = "Posts"
            url = "posts"

# --- 3. 导航菜单区（这是独立模块，放在最后） ---
[[menu.main]]
    name = "Tech"
    url = "/posts"
    weight = 10

[[menu.main]]
    name = "Lifestyle"
    url = "/lifestyle"
    weight = 20