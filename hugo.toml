baseURL = 'https://April1031.github.io/'
languageCode = 'zh-cn'
title = 'As a Metaphor'
theme = "PaperMod"

# --- 1. 全局配置区 ---
# 自动日期逻辑属于全局设置，建议放在这里
[frontmatter]
    date = [":git", "date", "publishDate"]
    lastmod = [":git", "lastmod", "date", "publishDate"]

# --- 2. 网站参数区 ---
[params]
    env = "production"
    robotsNoIndex = false 
    defaultTheme = "auto"
    ShowReadingTime = true
    ShowCodeCopyButtons = true

    # 个人主页设置（必须紧跟在 [params] 之后，不要被其他顶格标签打断）
    [params.profileMode]
        enabled = true
        title = "April1031"
        subtitle = "" 
        imageUrl = "/avatar1.png" 
        imageSize = 120
        imageTitle = "April1031"

        [[params.profileMode.buttons]]
            name = "Posts"
            url = "posts"

# --- 3. 导航菜单区 ---
[[menu.main]]
    name = "Tech"
    url = "/posts"
    weight = 10

[[menu.main]]
    name = "Lifestyle"
    url = "/lifestyle"
    weight = 20